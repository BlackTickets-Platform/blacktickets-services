name: Reusable Service CI

on:
  workflow_call:
    inputs:
      service_name:
        description: Service display name.
        required: true
        type: string
      service_path:
        description: Path to the service folder.
        required: true
        type: string
      ecr_repository:
        description: ECR repository name.
        required: true
        type: string
    secrets:
      AWS_ECR_PUSH_ROLE_ARN:
        required: true
      AWS_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      SNYK_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    name: Quality and Dependency Checks
    runs-on: ubuntu-latest
    env:
      HAS_SNYK_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
      HAS_SONAR_CONFIG: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ inputs.service_path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build if available
        run: npm run build --if-present

      - name: Run tests if available
        run: npm test --if-present

      - name: Run depcheck
        run: npx depcheck --ignores="@vitejs/plugin-react,vite,eslint,prettier"

      - name: Run Snyk dependency scan
        if: ${{ env.HAS_SNYK_TOKEN == 'true' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=${{ inputs.service_path }}/package.json

      - name: Skip Snyk dependency scan
        if: ${{ env.HAS_SNYK_TOKEN != 'true' }}
        run: echo "SNYK_TOKEN is not configured; skipping Snyk scan."

      - name: Run SonarQube scan
        if: ${{ env.HAS_SONAR_CONFIG == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.organization=blacktickets-platform
            -Dsonar.projectKey=blacktickets-${{ inputs.service_name }}
            -Dsonar.projectName=blacktickets-${{ inputs.service_name }}

      - name: Skip SonarQube scan
        if: ${{ env.HAS_SONAR_CONFIG != 'true' }}
        run: echo "SONAR_TOKEN or SONAR_HOST_URL is not configured; skipping SonarQube scan."

  build-scan-push:
    name: Build, Scan, and Push Image
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
      image_uri: ${{ steps.version.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Calculate semantic version
        if: ${{ github.ref_name == 'main' }}
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: v
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true

      - name: Resolve semantic image tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            IMAGE_TAG="v${{ steps.semver.outputs.version }}"
            MOVING_TAG="prod"
          else
            IMAGE_TAG="dev-${GITHUB_SHA}"
            MOVING_TAG="dev"
          fi

          IMAGE_URI="${ECR_REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}"
          SHA_URI="${ECR_REGISTRY}/${{ inputs.ecr_repository }}:${GITHUB_SHA}"
          MOVING_URI="${ECR_REGISTRY}/${{ inputs.ecr_repository }}:${MOVING_TAG}"

          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "sha_uri=${SHA_URI}" >> "${GITHUB_OUTPUT}"
          echo "moving_uri=${MOVING_URI}" >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.version.outputs.image_uri }}" \
            --tag "${{ steps.version.outputs.sha_uri }}" \
            --tag "${{ steps.version.outputs.moving_uri }}" \
            "${{ inputs.service_path }}"

      - name: Resolve Trivy exit code
        id: trivy
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "exit_code=1" >> "${GITHUB_OUTPUT}"
          else
            echo "exit_code=0" >> "${GITHUB_OUTPUT}"
          fi

      - name: Ensure Trivy ignore file exists
        shell: bash
        run: |
          if [ ! -f "${{ inputs.service_path }}/.trivyignore" ]; then
            mkdir -p "$(dirname "${{ inputs.service_path }}/.trivyignore")"
            touch "${{ inputs.service_path }}/.trivyignore"
          fi

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.version.outputs.image_uri }}
          format: table
          output: trivy-${{ inputs.service_name }}.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: ${{ steps.trivy.outputs.exit_code }}
        env:
          TRIVY_IGNOREFILE: ${{ inputs.service_path }}/.trivyignore

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ inputs.service_name }}
          path: trivy-${{ inputs.service_name }}.txt
          if-no-files-found: ignore

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.version.outputs.image_uri }}"
          docker push "${{ steps.version.outputs.sha_uri }}"
          docker push "${{ steps.version.outputs.moving_uri }}"

  helm-update:
    name: Update Helm Chart Tag
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: ${{ github.ref_name == 'dev' || github.ref_name == 'main' }}
    permissions:
      contents: write
    steps:
      - name: Checkout blacktickets-helm repo
        uses: actions/checkout@v4
        with:
          repository: BlackTickets-Platform/blacktickets-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-repo
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          YQ_VERSION="v4.40.5"
          curl -sL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Determine target values file and service key
        id: config
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            VALUES_FILE="charts/blacktickets/values-prod.yaml"
          else
            VALUES_FILE="charts/blacktickets/values-dev.yaml"
          fi
          SERVICE_KEY="${{ inputs.service_name }}"
          echo "values_file=${VALUES_FILE}" >> "${GITHUB_OUTPUT}"
          echo "service_key=${SERVICE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "Target values file: ${VALUES_FILE}"

      - name: Update image tag with yq
        shell: bash
        working-directory: helm-repo
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ needs.build-scan-push.outputs.image_tag }}"
          SERVICE_KEY="${{ steps.config.outputs.service_key }}"
          VALUES_FILE="${{ steps.config.outputs.values_file }}"

          echo "Updating ${SERVICE_KEY} in ${VALUES_FILE} to ${IMAGE_TAG}"
          yq eval -i ".services.${SERVICE_KEY}.tag = \"${IMAGE_TAG}\"" "${VALUES_FILE}"

          UPDATED_TAG=$(yq eval ".services.${SERVICE_KEY}.tag" "${VALUES_FILE}")
          echo "Updated tag: ${UPDATED_TAG}"
          if [[ "${UPDATED_TAG}" != "${IMAGE_TAG}" ]]; then
            echo "Tag verification failed"
            exit 1
          fi

      - name: Commit and push
        shell: bash
        working-directory: helm-repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SERVICE_NAME="${{ inputs.service_name }}"
          IMAGE_TAG="${{ needs.build-scan-push.outputs.image_tag }}"
          BRANCH_NAME="${{ github.ref_name }}"
          SERVICE_KEY="${{ steps.config.outputs.service_key }}"
          VALUES_FILE="${{ steps.config.outputs.values_file }}"

          # Discard any unstaged changes left by the previous yq step so
          # git pull --rebase can run cleanly on the first attempt.
          git restore "${VALUES_FILE}"

          for attempt in 1 2 3 4 5; do
            echo "--- Push attempt ${attempt} ---"

            # Pull latest to avoid non-fast-forward rejections from parallel jobs
            git pull --rebase origin "${BRANCH_NAME}"

            # Apply our tag on top of the freshly-pulled file
            yq eval -i ".services.${SERVICE_KEY}.tag = \"${IMAGE_TAG}\"" "${VALUES_FILE}"
            git add "${VALUES_FILE}"

            if git diff --cached --quiet; then
              echo "Tag already up to date after rebase. Nothing to commit."
              exit 0
            fi

            git commit -m "ci: update ${SERVICE_NAME} image tag to ${IMAGE_TAG} (attempt ${attempt})"

            if git push origin HEAD:"${BRANCH_NAME}"; then
              echo "Successfully pushed updated tag for ${SERVICE_NAME}."
              exit 0
            fi

            echo "Push rejected (concurrent write). Resetting and retrying in ${attempt}s..."
            git reset --soft HEAD~1
            # Restore file so next git pull --rebase is clean
            git restore "${VALUES_FILE}"
            sleep "${attempt}"
          done

          echo "ERROR: Failed to push after 5 attempts."
          exit 1

# trigger run
