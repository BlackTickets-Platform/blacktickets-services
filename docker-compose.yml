version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-for-local-only}
      POSTGRES_DB: ticketing_prod
    # No port binding - internal only for production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  identity-service:
    build: ./identity-service
    container_name: identity-service
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_NAME: identity_db
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "pgrep", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  event-service:
    build: ./event-service
    container_name: event-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    networks:
      - ticketing_network
    env_file:
      - .env.production
    environment:
      DB_NAME: event_db
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  booking-service:
    build: ./booking-service
    container_name: booking-service
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_NAME: booking_db
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
    ports:
      - "4003:4003"
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "pgrep", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  chatbot-service:
    build: ./chatbot-service
    container_name: chatbot-service
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      BOOKING_SERVICE_URL: http://booking-service:4003
      AWS_REGION: us-east-1
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_PROFILE: default
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      event-service:
        condition: service_healthy
    ports:
      - "4004:4004"
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "pgrep", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: ticketing-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.production
    volumes:
      - ./frontend/nginx/local.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      identity-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      chatbot-service:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: ticketing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - identity-service
      - event-service
      - booking-service
      - chatbot-service
    networks:
      - ticketing_network

networks:
  ticketing_network:
    driver: bridge

volumes:
  postgres_data:
